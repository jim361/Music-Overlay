name: Windows Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-build.txt

      - name: Build executable
        shell: pwsh
        run: |
          python -m PyInstaller packaging\music_skin_overlay.spec --noconfirm --clean

      - name: Package artifact
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ("${{ github.ref_type }}" -ne "tag") {
            $version = "dev-${{ github.sha }}"
          }
          powershell -ExecutionPolicy Bypass -File scripts\package_release.ps1 -Version $version

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicSkinOverlay-win-x64
          path: artifacts/*.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" artifacts\*.zip --title "${{ github.ref_name }}" --generate-notes
